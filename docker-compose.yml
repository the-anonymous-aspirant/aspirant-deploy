services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/the-anonymous-aspirant/aspirant-server:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      GIN_MODE: "release"
      TRANSCRIBER_URL: http://transcriber:8000
      COMMANDER_URL: http://commander:8000
      TRANSLATOR_URL: http://translator:8000
    env_file:
      - .env
    volumes:
      - filedata:/data/files
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: ghcr.io/the-anonymous-aspirant/aspirant-client:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "8999:80"

  transcriber:
    image: ghcr.io/the-anonymous-aspirant/aspirant-transcriber:latest
    restart: unless-stopped
    ports:
      - "8082:8000"
    env_file:
      - .env
    environment:
      AUDIO_STORAGE_PATH: /data/audio
      WHISPER_MODEL: base
    volumes:
      - audiodata:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 2g

  commander:
    image: ghcr.io/the-anonymous-aspirant/aspirant-commander:latest
    restart: unless-stopped
    ports:
      - "8083:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  translator:
    image: ghcr.io/the-anonymous-aspirant/aspirant-translator:latest
    restart: unless-stopped
    ports:
      - "8084:8000"
    volumes:
      - translatordata:/data/models
    mem_limit: 2g

volumes:
  pgdata:
  filedata:
  audiodata:
  translatordata:
