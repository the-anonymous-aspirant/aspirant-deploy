services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../aspirant-server
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      GIN_MODE: "release"
      DB_HOST: postgres
      TRANSCRIBER_URL: http://transcriber:8000
      COMMANDER_URL: http://commander:8000
      TRANSLATOR_URL: http://translator:8000
      MONITOR_URL: http://monitor:8000
      KIWIX_URL: http://kiwix:8080
    env_file:
      - .env
    volumes:
      - filedata-dev:/data/files
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ../aspirant-client
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "8999:80"
    depends_on:
      - server

  transcriber:
    build:
      context: ../aspirant-transcriber
      dockerfile: Dockerfile
    ports:
      - "8082:8000"
    env_file:
      - .env
    environment:
      AUDIO_STORAGE_PATH: /data/audio
      WHISPER_MODEL: base
      DB_HOST: postgres
    volumes:
      - audiodata-dev:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 2g

  commander:
    build:
      context: ../aspirant-commander
      dockerfile: Dockerfile
    ports:
      - "8083:8000"
    environment:
      DB_HOST: postgres
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  translator:
    build:
      context: ../aspirant-translator
      dockerfile: Dockerfile
    ports:
      - "8084:8000"
    volumes:
      - translatordata-dev:/data/models
    mem_limit: 2g

  monitor:
    build:
      context: ../aspirant-monitor
      dockerfile: Dockerfile
    ports:
      - "8085:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /data:/host/data:ro

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    command: --port 8080 --urlRootLocation /api/wikipedia /data/wikipedia_en_all_maxi_2026-02.zim
    volumes:
      - kiwixdata-dev:/data:ro

volumes:
  pgdata-dev:
  filedata-dev:
  audiodata-dev:
  translatordata-dev:
  kiwixdata-dev:
